<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="konten">
    <h2>Formulir Pendaftaran</h2>
    <div class="kartu">
      <form>
        <label>Nama Lengkap:</label><br>
        <input type="text" placeholder="Masukkan nama lengkap"><br><br>

        <label>Email:</label><br>
        <input type="email" placeholder="email@contoh.com"><br><br>

        <label>Password:</label><br>
        <input type="password" placeholder="Masukkan password"><br><br>

        <label>Jenis Kelamin:</label><br>
        <input type="radio" name="jk" style="width:auto; padding:0;"> Laki-laki
        <input type="radio" name="jk" style="width:auto; padding:0;"> Perempuan<br><br>

        <label>Kota Asal:</label><br>
        <select>
          <option value="">-- Pilih Kota --</option>
          <option>Jakarta</option>
          <option>Surabaya</option>
          <option>Ponorogo</option>
          <option>Madiun</option>
          <option>Lainnya</option>
        </select><br><br>

        <label>Pesan / Perkenalan Singkat:</label><br>
        <textarea rows="4" cols="40" placeholder="Tulis perkenalan singkat..."></textarea><br><br>

        <input type="submit" value="Daftar">
        <input type="reset" value="Reset">
      </form>
    </div>
</div>
